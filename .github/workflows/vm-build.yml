name: Build VM Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vm:
    # VM is only needed on Apple Silicon Macs - on Linux you run containers directly
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate config
        run: |
          mkdir -p internal/config
          cat > internal/config/config.go << 'EOF'
          package config

          const (
            Prefix = "/tmp/tempest"
            Libexecdir = "/tmp/tempest/libexec"
            Localstatedir = "/tmp/tempest/var/lib"
          )
          EOF

          cat > c/config.h << 'EOF'
          #pragma once

          #ifndef PREFIX
          #define PREFIX "/tmp/tempest"
          #endif

          #ifndef LIBEXECDIR
          #define LIBEXECDIR "/tmp/tempest/libexec"
          #endif

          #ifndef LOCALSTATEDIR
          #define LOCALSTATEDIR "/tmp/tempest/var/lib"
          #endif
          EOF

      - name: Build Go binaries for Linux
        run: |
          GOOS=linux GOARCH=arm64 go build -o _build/tempest-vm-daemon-linux ./cmd/tempest-vm-daemon
          GOOS=linux GOARCH=arm64 go build -o _build/tempest-grain-agent-linux ./cmd/tempest-grain-agent

      - name: Build sandbox-launcher
        run: |
          mkdir -p _build

          # Generate constants.h
          cc -o _build/gen-clean-h c/gen-clean-h.c
          _build/gen-clean-h > _build/constants.h

          # Get bpf_asm tool from Linux source
          git clone --depth 1 https://github.com/torvalds/linux.git /tmp/linux-src
          cd /tmp/linux-src/tools/bpf
          make bpf_asm
          sudo cp bpf_asm /usr/local/bin/
          cd -

          # Preprocess and assemble BPF filter
          cpp -I _build -DTEMPEST_ROSETTA_COMPAT c/filter.s -o _build/filter_preproc.s
          bpf_asm -c < _build/filter_preproc.s > _build/bpf_filter.h

          # Compile sandbox-launcher for VM (LIBEXECDIR=/bin, LOCALSTATEDIR="")
          cc -I _build -std=c11 -Wall -Wextra -static \
              -DLIBEXECDIR='"/bin"' -DLOCALSTATEDIR='""' -DTEMPEST_ROSETTA_COMPAT \
              -c -o c/sandbox-launcher.o c/sandbox-launcher.c
          cc -static -o _build/tempest-sandbox-launcher c/sandbox-launcher.o

      - name: Build initramfs
        run: ./vm/build.sh initramfs

      - name: Package initrd
        run: |
          mkdir -p dist
          cp _build/vm/output/initrd dist/tempest-vm-arm64-initrd.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-initrd-arm64
          path: dist/tempest-vm-arm64-initrd.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/tempest-vm-arm64-initrd.gz
          generate_release_notes: true
